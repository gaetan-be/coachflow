<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genius Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #202C34;
  --navy2: #2A3840;
  --teal: #40A2C0;
  --teal2: #338BA3;
  --teal-soft: #40A2C012;
  --slate: #6B9DB5;
  --slate-soft: rgba(107,157,181,0.08);
  --gold: #BEA674;
  --pop: #EA226C;
  --green: #4caf82;
  --purple: #7f77dd;
  --border: #EAEDEF;
  --border2: #40A2C033;
  --text: #202C34;
  --muted: #6B7580;
  --label: #202C34;
  --input-bg: #FFFFFF;
  --input-border: #EAEDEF;
  --section-sep: #EAEDEF;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: #F6F7F9;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed;
  top: -200px; right: -150px;
  width: 650px; height: 650px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(64,162,192,0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -200px; left: -100px;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(107,157,181,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ========== HEADER ========== */
.page-header-wrap {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid #EAEDEF;
  box-shadow: 0 1px 8px rgba(32,44,52,0.04);
}
.page-header {
  padding: 20px 48px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 16px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-self: start;
}
.logo-g {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 2px solid var(--teal);
  background: rgba(64,162,192,0.12);
  box-shadow: 0 0 14px rgba(64,162,192,0.30);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--teal);
  flex-shrink: 0;
}
.logo-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 400;
  color: #202C34;
  letter-spacing: -0.02em;
}
.header-title {
  justify-self: center;
  font-size: 14px;
  color: var(--muted);
  font-weight: 400;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.header-title em {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--pop);
}
.header-right-group {
  justify-self: end;
  display: flex;
  align-items: center;
  gap: 14px;
  white-space: nowrap;
}
.btn-logout {
  font-size: 12px;
  font-weight: 500;
  color: var(--teal);
  text-decoration: none;
  padding: 6px 14px;
  border: 1px solid rgba(64,162,192,0.25);
  border-radius: 999px;
  transition: all 0.2s;
  background: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}
.btn-logout:hover {
  background: rgba(64,162,192,0.06);
  border-color: var(--teal);
}

/* ========== TABLE ========== */
.table-wrapper {
  position: relative;
  z-index: 1;
  max-width: 860px;
  margin: 48px auto 0;
  padding: 0 32px;
  animation: fadeUp 0.5s ease both;
}
.coachee-table {
  width: 100%;
  background: #FFFFFF;
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  border-collapse: separate;
  border-spacing: 0;
  box-shadow: 0 1px 4px rgba(32,44,52,0.04);
}
.coachee-table thead th {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 600;
  padding: 18px 24px;
  background: #FAFBFC;
  border-bottom: 1px solid var(--border);
  text-align: left;
}
.coachee-table tbody tr {
  cursor: pointer;
  transition: background 0.2s;
}
.coachee-table tbody tr:hover {
  background: rgba(64,162,192,0.03);
}
.coachee-table tbody td {
  padding: 16px 24px;
  font-size: 14px;
  color: var(--text);
  border-bottom: 1px solid var(--border);
}
.coachee-table tbody tr:last-child td {
  border-bottom: none;
}
.coachee-table tbody td:first-child {
  font-weight: 500;
}

/* Status badges */
.status-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.status-badge.done {
  background: rgba(76,175,130,0.10);
  color: var(--green);
  border: 1px solid rgba(76,175,130,0.25);
}
.status-badge.new {
  background: rgba(64,162,192,0.08);
  color: var(--teal);
  border: 1px solid rgba(64,162,192,0.25);
}
.status-badge.queued {
  background: rgba(190,166,116,0.10);
  color: var(--gold);
  border: 1px solid rgba(190,166,116,0.25);
}
.status-badge.processing {
  background: rgba(127,119,221,0.10);
  color: var(--purple);
  border: 1px solid rgba(127,119,221,0.25);
}
.status-badge.error {
  background: rgba(234,34,108,0.08);
  color: var(--pop);
  border: 1px solid rgba(234,34,108,0.20);
}

.empty-state {
  padding: 64px 24px;
  text-align: center;
  font-size: 14px;
  color: var(--muted);
  line-height: 1.8;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@media (max-width: 640px) {
  .page-header {
    padding: 14px 20px;
    grid-template-columns: 1fr auto;
    gap: 10px;
  }
  .logo-name { font-size: 14px; }
  .header-title { display: none; }
  .table-wrapper { padding: 0 16px; margin-top: 24px; }
  .coachee-table thead th { padding: 14px 16px; font-size: 8px; }
  .coachee-table tbody td { padding: 12px 16px; font-size: 13px; }
}
</style>
</head>
<body>

<div class="page-header-wrap">
  <header class="page-header">
    <div class="logo">
      <div class="logo-g">G</div>
      <span class="logo-name">Genius Augmented Outcome</span>
    </div>
    <div class="header-title">
      Liste des <em>coachees</em>
    </div>
    <div class="header-right-group">
      <button class="btn-logout" onclick="logout()">Deconnexion</button>
    </div>
  </header>
</div>

<div class="table-wrapper">
  <div id="list-content">
    <div class="empty-state">Chargement...</div>
  </div>
</div>

<script>
function logout() {
  fetch('/api/logout', { method: 'POST' }).then(function() {
    window.location.href = '/coach';
  });
}

function statusLabel(s) {
  if (!s) return '<span class="status-badge new">Nouveau</span>';
  var map = {
    queued:     '<span class="status-badge queued">En attente</span>',
    processing: '<span class="status-badge processing">En cours</span>',
    done:       '<span class="status-badge done">Termin\u00e9</span>',
    error:      '<span class="status-badge error">Erreur</span>'
  };
  return map[s] || '<span class="status-badge new">Nouveau</span>';
}

function formatDate(d) {
  if (!d) return '\u2014';
  return new Date(d).toLocaleDateString('fr-BE', {
    day: '2-digit', month: '2-digit', year: 'numeric'
  });
}

fetch('/api/coachees')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var el = document.getElementById('list-content');
    if (data.length === 0) {
      el.innerHTML = '<div class="empty-state">Aucun coachee pour le moment.<br>Les questionnaires soumis appara\u00eetront ici.</div>';
      return;
    }
    var html = '<table class="coachee-table"><thead><tr>';
    html += '<th>Nom</th><th>Date de soumission</th><th>Statut rapport</th>';
    html += '</tr></thead><tbody>';
    data.forEach(function(c) {
      html += '<tr onclick="window.location.href=\'/backoffice/coachee/' + c.id + '\'">';
      html += '<td>' + c.prenom + ' ' + c.nom + '</td>';
      html += '<td>' + formatDate(c.created_at) + '</td>';
      html += '<td>' + statusLabel(c.report_status) + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  });
</script>
</body>
</html>
