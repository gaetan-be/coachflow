<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genius Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #202C34;
  --navy2: #2A3840;
  --teal: #40A2C0;
  --teal2: #338BA3;
  --teal-soft: #40A2C012;
  --slate: #6B9DB5;
  --gold: #BEA674;
  --pop: #EA226C;
  --border: #EAEDEF;
  --text: #202C34;
  --muted: #6B7580;
  --input-bg: #FFFFFF;
  --input-border: #EAEDEF;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}
body {
  background: #F6F7F9;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: -200px; right: -150px;
  width: 650px; height: 650px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(64,162,192,0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -200px; left: -100px;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(107,157,181,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
.login-card {
  position: relative;
  z-index: 1;
  background: #FFFFFF;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px 40px 40px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 2px 24px rgba(32,44,52,0.06);
  animation: fadeUp 0.5s ease both;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
  margin-bottom: 32px;
}
.logo-g {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 2px solid var(--teal);
  background: rgba(64,162,192,0.12);
  box-shadow: 0 0 14px rgba(64,162,192,0.30);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--teal);
  flex-shrink: 0;
}
.logo-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 400;
  color: #202C34;
  letter-spacing: -0.02em;
}
.login-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 400;
  color: var(--muted);
  text-align: center;
  margin-bottom: 32px;
  letter-spacing: -0.01em;
}
.field-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 20px;
}
label {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text);
  font-weight: 600;
}
input[type="email"],
input[type="password"] {
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: 12px;
  padding: 12px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  width: 100%;
}
input:focus {
  border-color: var(--teal);
  box-shadow: 0 0 0 3px rgba(64,162,192,0.08);
}
input::placeholder { color: #BFC5CC; }
.btn-login {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 14px 32px;
  background: var(--navy);
  color: #FFFFFF;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  border: none;
  border-radius: 100px;
  cursor: pointer;
  transition: all 0.25s;
  margin-top: 8px;
  min-height: 48px;
}
.btn-login:hover {
  background: var(--teal);
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(64,162,192,0.35);
}
.btn-login:active { transform: translateY(0); }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@media (max-width: 480px) {
  .login-card {
    margin: 20px;
    padding: 36px 24px 32px;
  }
  .logo-name { font-size: 15px; }
  .login-title { font-size: 19px; }
}
</style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="logo-g">G</div>
      <span class="logo-name">Genius Augmented Outcome</span>
    </div>
    <div class="login-title">Espace coach</div>
    <form method="POST" action="/api/login">
      <div class="field-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="votre@email.com" required>
      </div>
      <div class="field-group">
        <label>Mot de passe</label>
        <input type="password" name="password" placeholder="Votre mot de passe" required>
      </div>
      <button type="submit" class="btn-login">Se connecter</button>
    </form>
  </div>
</body>
</html>
