<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRENSO &mdash; Backoffice</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/backoffice.css">
</head>
<body>

<div class="page-header-wrap">
  <header class="page-header">
    <div class="logo">
      <div class="logo-g">B</div>
      <span class="logo-name">BRENSO</span>
    </div>
    <div class="header-rapport">
      Liste des <span>coach&eacute;es</span>
    </div>
    <div class="header-right-group">
      <div class="profile-menu" id="profile-menu">
        <button class="profile-avatar" id="profile-avatar-btn" onclick="toggleProfileMenu()" aria-label="Mon profil">B</button>
        <div class="profile-popover" id="profile-popover" hidden>
          <div class="popover-top">
            <span class="popover-name" id="popover-name">&hellip;</span>
            <span class="popover-plan" id="popover-plan"></span>
          </div>
          <div class="popover-credits" id="popover-credits">
            <div class="credit-bar-wrap"><div class="credit-bar-fill" id="credit-bar-fill"></div></div>
            <span class="credit-label" id="credit-label">&hellip;</span>
          </div>
          <div class="popover-sep"></div>
          <a href="/backoffice/profile" class="popover-link">Mon profil &rarr;</a>
          <button class="popover-link popover-logout" onclick="logout()">D&eacute;connexion</button>
        </div>
      </div>
    </div>
  </header>
</div>

<div class="list-wrapper">
  <div id="list-content"></div>
</div>

<script>
function logout() {
  fetch('/api/logout', { method: 'POST' }).then(function() {
    window.location.href = '/coach';
  });
}

(function() {
  fetch('/api/coach/me').then(function(r) { return r.json(); }).then(function(d) {
    var initial = d.name ? d.name.charAt(0).toUpperCase() : 'C';
    document.getElementById('profile-avatar-btn').textContent = initial;
    document.getElementById('popover-name').textContent = d.name || '';
    if (d.plan_display_name) {
      document.getElementById('popover-plan').textContent = d.plan_display_name;
      document.getElementById('popover-plan').style.display = '';
    } else {
      document.getElementById('popover-plan').style.display = 'none';
    }
    var creditsEl = document.getElementById('popover-credits');
    if (d.plan) {
      var total = d.allocations.reduce(function(s, a) { return s + a.amount; }, 0);
      var used  = d.allocations.reduce(function(s, a) { return s + a.used;   }, 0);
      var pct   = total > 0 ? Math.round((used / total) * 100) : 0;
      document.getElementById('credit-bar-fill').style.width = pct + '%';
      document.getElementById('credit-label').textContent = d.balance + ' cr\u00e9dit' + (d.balance !== 1 ? 's' : '') + ' restant' + (d.balance !== 1 ? 's' : '');
      creditsEl.style.display = '';
    } else {
      creditsEl.style.display = 'none';
    }
  });

  function toggleProfileMenu() {
    var pop = document.getElementById('profile-popover');
    pop.hidden = !pop.hidden;
  }
  window.toggleProfileMenu = toggleProfileMenu;

  document.addEventListener('click', function(e) {
    var menu = document.getElementById('profile-menu');
    if (menu && !menu.contains(e.target)) {
      document.getElementById('profile-popover').hidden = true;
    }
  });
})();

function statusLabel(s) {
  if (!s) return '<span class="status-badge new">Nouveau</span>';
  var map = {
    queued:     '<span class="status-badge queued">En attente</span>',
    processing: '<span class="status-badge processing">En cours</span>',
    done:       '<span class="status-badge done">Termin&eacute;</span>',
    error:      '<span class="status-badge error">Erreur</span>'
  };
  return map[s] || '<span class="status-badge new">Nouveau</span>';
}

function formatDate(d) {
  if (!d) return '&mdash;';
  return new Date(d).toLocaleDateString('fr-BE', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

fetch('/api/coachees')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var el = document.getElementById('list-content');
    if (data.length === 0) {
      el.innerHTML = '<div class="empty-state">Aucun coachee pour le moment.<br>Les questionnaires soumis appara&icirc;tront ici.</div>';
      return;
    }

    var html = '<table class="coachee-table"><thead><tr>';
    html += '<th>Nom</th><th>Date de soumission</th><th>Statut rapport</th><th></th>';
    html += '</tr></thead><tbody>';

    data.forEach(function(c) {
      var downloadCell = c.report_status === 'done'
        ? '<a class="btn-report-download" href="/api/coachee/' + c.id + '/report/download" onclick="event.stopPropagation()" title="T\u00e9l\u00e9charger le rapport">'
          + '<img src="/img/word.svg" width="16" height="16" alt="">'
          + 'Rapport</a>'
        : '';
      html += '<tr onclick="window.location.href=\'/backoffice/coachee/' + c.id + '\'">';
      html += '<td>' + c.prenom + ' ' + c.nom + '</td>';
      html += '<td>' + formatDate(c.created_at) + '</td>';
      html += '<td>' + statusLabel(c.report_status) + '</td>';
      html += '<td>' + downloadCell + '</td>';
      html += '</tr>';
    });

    html += '</tbody></table>';
    el.innerHTML = html;
  });
</script>
</body>
</html>
