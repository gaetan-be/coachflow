<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRENSO &mdash; Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="login-card">
  <div class="logo">
    <div class="logo-circle">B</div>
    <div class="logo-name">BRENSO</div>
  </div>
  <h2>Espace coach</h2>

  <form id="login-form">
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="email" inputmode="email" autocomplete="username"
             autocapitalize="none" autocorrect="off" spellcheck="false"
             placeholder="votre@email.com" required>
    </div>
    <div class="login-field">
      <label>Mot de passe</label>
      <input type="password" id="password" autocomplete="current-password"
             placeholder="Votre mot de passe" required>
    </div>
    <button type="submit" class="login-btn">Se connecter</button>
    <div class="login-error" id="login-error"></div>
  </form>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var errEl = document.getElementById('login-error');
  errEl.classList.remove('visible');

  fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    })
  })
  .then(function(res) {
    if (!res.ok) return res.json().then(function(j) { throw new Error(j.error || 'Erreur'); });
    return res.json();
  })
  .then(function() {
    window.location.href = '/backoffice';
  })
  .catch(function(err) {
    errEl.textContent = err.message;
    errEl.classList.add('visible');
  });
});
</script>
</body>
</html>
