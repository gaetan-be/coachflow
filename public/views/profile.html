<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRENSO &mdash; Mon profil</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/backoffice.css">
</head>
<body>

<div class="page-header-wrap">
  <header class="page-header">
    <div class="logo">
      <div class="logo-g">B</div>
      <span class="logo-name">BRENSO</span>
    </div>
    <div class="header-rapport">
      Mon <span>profil</span>
    </div>
    <div class="header-right-group">
      <a href="/backoffice" class="header-dashboard">&larr; Liste</a>
      <div class="profile-menu" id="profile-menu">
        <button class="profile-avatar" id="profile-avatar-btn" onclick="toggleProfileMenu()" aria-label="Mon profil">B</button>
        <div class="profile-popover" id="profile-popover" hidden>
          <div class="popover-top">
            <span class="popover-name" id="popover-name">&hellip;</span>
            <span class="popover-plan" id="popover-plan"></span>
          </div>
          <div class="popover-credits" id="popover-credits">
            <div class="credit-bar-wrap"><div class="credit-bar-fill" id="credit-bar-fill"></div></div>
            <span class="credit-label" id="credit-label">&hellip;</span>
          </div>
          <div class="popover-sep"></div>
          <a href="/backoffice/profile" class="popover-link popover-link-active">Mon profil &rarr;</a>
          <button class="popover-link popover-logout" onclick="logout()">D&eacute;connexion</button>
        </div>
      </div>
    </div>
  </header>
</div>

<div class="form-wrapper" id="profile-wrapper">

  <!-- PASSWORD -->
  <div class="section">
    <div class="section-header" onclick="toggleSection(this)">
      <span class="section-tag profile-tag">01</span>
      <span class="section-title">Changer le mot de passe</span>
      <span class="section-toggle">&#9660;</span>
    </div>
    <div class="section-body">
      <div class="identity-grid" style="max-width:480px;">
        <div class="field-group">
          <label>Mot de passe actuel</label>
          <input type="password" id="current-password" placeholder="Votre mot de passe actuel" autocomplete="current-password">
        </div>
        <div class="field-group">
          <label>Nouveau mot de passe</label>
          <input type="password" id="new-password" placeholder="8 caract&egrave;res minimum" autocomplete="new-password">
        </div>
      </div>
      <div style="margin-top:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
        <button class="btn-save" onclick="changePassword()">Mettre &agrave; jour</button>
        <span id="pw-feedback" class="profile-feedback"></span>
      </div>
    </div>
  </div>

  <!-- REPORT HISTORY -->
  <div class="section">
    <div class="section-header" onclick="toggleSection(this)">
      <span class="section-tag profile-tag" style="background:var(--slate)">02</span>
      <span class="section-title">Historique des rapports</span>
      <span class="section-toggle">&#9660;</span>
    </div>
    <div class="section-body">
      <div id="reports-list"><p style="color:var(--muted);font-size:13px;">Chargement&hellip;</p></div>
    </div>
  </div>

  <!-- CREDITS -->
  <div class="section">
    <div class="section-header" onclick="toggleSection(this)">
      <span class="section-tag profile-tag" style="background:var(--teal)">03</span>
      <span class="section-title">Mes cr&eacute;dits</span>
      <span class="section-toggle">&#9660;</span>
    </div>
    <div class="section-body">
      <div id="credits-list"><p style="color:var(--muted);font-size:13px;">Chargement&hellip;</p></div>
    </div>
  </div>

</div>

<script src="/js/profile.js"></script>
</body>
</html>
