version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: brenso
      POSTGRES_PASSWORD: brenso
      POSTGRES_DB: brenso
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://brenso:brenso@postgres:5432/brenso
    volumes:
      - ./templates:/app/templates

volumes:
  pgdata:
