version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: brenso
      POSTGRES_PASSWORD: brenso
      POSTGRES_DB: brenso
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://brenso:brenso@postgres:5432/brenso
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-20250514}
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./templates:/app/templates
      - ./claude-tpl-maker:/app/claude-tpl-maker
    command: npm run dev

volumes:
  pgdata:
